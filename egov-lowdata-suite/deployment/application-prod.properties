# Production Configuration for Gabia Hosting
# MySQL Database Configuration

# Database
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.url=jdbc:mysql://db.forhim.kr:3306/dbwilliam7872ksh?useSSL=true&useUnicode=true&characterEncoding=UTF-8&serverTimezone=Asia/Seoul
spring.datasource.username=william7872ksh
spring.datasource.password=YOUR_DB_PASSWORD_HERE

# Connection Pool
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.idle-timeout=600000
spring.datasource.hikari.max-lifetime=1800000

# MyBatis
mybatis.configuration.map-underscore-to-camel-case=true
mybatis.type-aliases-package=egovframework.govportal.**.model
mybatis.mapper-locations=classpath:egovframework/sqlmap/**/*.xml

# Logging
logging.level.root=INFO
logging.level.egovframework=INFO
logging.level.kr.go.dgif=INFO
logging.file.name=/home/hosting_users/william7872ksh/logs/app.log
logging.file.max-size=10MB
logging.file.max-history=30

# Security
server.servlet.session.timeout=30m
server.servlet.session.cookie.http-only=true
server.servlet.session.cookie.secure=true

# Application
spring.application.name=egov-portal
server.port=8080

# File Upload
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# Thymeleaf (if used)
spring.thymeleaf.cache=true

# JSP
spring.mvc.view.prefix=/WEB-INF/jsp/
spring.mvc.view.suffix=.jsp

# ODK Central Integration (Update with your actual ODK Central URL)
odk.central.url=https://your-odk-central.com
odk.central.email=admin@example.com
odk.central.password=your-odk-password

# Tenant Configuration
app.default-tenant-id=00000000-0000-0000-0000-000000000001

